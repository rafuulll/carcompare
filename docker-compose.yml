version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: carcompare_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-carcompare}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - carcompare_network

  backend:
    build: ./backend
    container_name: carcompare_backend
    restart: always
    depends_on:
      - db
    environment:
      PORT: 3001
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-carcompare}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-changeme_secret}
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - carcompare_network

  frontend:
    build: ./frontend
    container_name: carcompare_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - carcompare_network

volumes:
  pgdata:

networks:
  carcompare_network:
    driver: bridge
